<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agents — VoiceAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans" x-data="agentsApp()" x-init="init()">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- Modal Backdrop -->
  <div
    x-show="showModal"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click.self="closeModal()"
    class="fixed inset-0 bg-gray-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">

    <!-- Modal -->
    <div
      x-show="showModal"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 scale-95"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 scale-100"
      x-transition:leave-end="opacity-0 scale-95"
      class="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-lg shadow-2xl">

      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-800">
        <h2 class="text-lg font-semibold text-gray-100" x-text="editingAgent ? 'Edit Agent' : 'New Agent'"></h2>
        <button @click="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-200 hover:bg-gray-800 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>

      <form @submit.prevent="saveAgent()" class="px-6 py-5 space-y-5">
        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">
            Agent Name <span class="text-red-400">*</span>
          </label>
          <input
            x-model="form.name"
            type="text"
            placeholder="Sales SDR, Support Agent..."
            required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>

        <!-- System Prompt -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">
            System Prompt <span class="text-red-400">*</span>
          </label>
          <textarea
            x-model="form.system_prompt"
            rows="6"
            placeholder="You are a helpful assistant..."
            required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none font-mono"></textarea>
        </div>

        <!-- Voice -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">
            Voice <span class="text-xs text-gray-500 font-normal ml-1">optional</span>
          </label>
          <div class="relative">
            <select
              x-model="form.voice_id"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition appearance-none cursor-pointer pr-10">
              <option value="">Use default voice</option>
              <template x-for="v in voices" :key="v.id">
                <option :value="v.id" x-text="v.name"></option>
              </template>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
              <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
            </div>
          </div>
        </div>

        <!-- LLM Model -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">
            LLM Model <span class="text-xs text-gray-500 font-normal ml-1">optional</span>
          </label>
          <div class="relative">
            <select
              x-model="form.llm_model"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition appearance-none cursor-pointer pr-10">
              <option value="">Use default model</option>
              <option value="llama-3.1-8b-instant">llama-3.1-8b-instant (fast)</option>
              <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile (higher quality)</option>
            </select>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 absolute right-3 top-3 pointer-events-none"></i>
          </div>
        </div>

        <!-- Footer -->
        <div class="flex items-center justify-end gap-3 pt-2">
          <button
            type="button"
            @click="closeModal()"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-200 hover:bg-gray-800 transition-colors">
            Cancel
          </button>
          <button
            type="submit"
            :disabled="formLoading"
            class="flex items-center gap-2 px-5 py-2 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-lg transition-colors">
            <span x-show="formLoading">
              <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
            </span>
            <span x-text="formLoading ? 'Saving...' : (editingAgent ? 'Save Changes' : 'Create Agent')"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-screen w-56 bg-gray-900 border-r border-gray-800 flex flex-col z-40">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-800">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i data-lucide="mic" class="w-4 h-4 text-white"></i>
      </div>
      <span class="font-bold text-lg text-gray-100 tracking-tight">VoiceAI</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="/agents.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-600/20 text-indigo-400 font-medium text-sm">
        <i data-lucide="bot" class="w-4 h-4"></i> Agents
      </a>
      <a href="/calls.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="phone" class="w-4 h-4"></i> Calls
      </a>
      <a href="/analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
      </a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-800">
      <p class="text-xs text-gray-500">VoiceAI Platform</p>
      <p class="text-xs text-gray-600">v1.0.0</p>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="ml-56 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-100">Agents</h1>
      <div class="flex items-center gap-4">
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium"
          :class="apiStatus === 'connected' ? 'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/30' : 'bg-red-500/10 text-red-400 ring-1 ring-red-500/30'">
          <span class="w-1.5 h-1.5 rounded-full" :class="apiStatus === 'connected' ? 'bg-emerald-400' : 'bg-red-400'"></span>
          <span x-text="apiStatus === 'connected' ? 'API Connected' : 'API Offline'"></span>
        </span>
        <button
          @click="openModal()"
          class="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
          New Agent
        </button>
      </div>
    </header>

    <main class="p-8 flex-1">

      <!-- Loading Skeleton -->
      <template x-if="loading">
        <div class="grid grid-cols-3 gap-4">
          <template x-for="i in 6" :key="i">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 space-y-3">
              <div class="h-5 w-32 bg-gray-800 rounded animate-pulse"></div>
              <div class="h-3 w-20 bg-gray-800 rounded animate-pulse"></div>
              <div class="h-3 w-24 bg-gray-800 rounded animate-pulse"></div>
              <div class="flex gap-2 pt-2">
                <div class="h-8 w-16 bg-gray-800 rounded-lg animate-pulse"></div>
                <div class="h-8 w-16 bg-gray-800 rounded-lg animate-pulse"></div>
              </div>
            </div>
          </template>
        </div>
      </template>

      <!-- Empty State -->
      <template x-if="!loading && agents.length === 0">
        <div class="flex flex-col items-center justify-center py-24">
          <div class="w-16 h-16 bg-gray-900 border border-gray-800 rounded-2xl flex items-center justify-center mb-5">
            <i data-lucide="bot" class="w-8 h-8 text-gray-600"></i>
          </div>
          <p class="text-base font-medium text-gray-400 mb-1">No agents yet</p>
          <p class="text-sm text-gray-600 mb-6">Create your first agent to start making calls</p>
          <button
            @click="openModal()"
            class="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg transition-colors">
            <i data-lucide="plus" class="w-4 h-4"></i>
            Create Agent
          </button>
        </div>
      </template>

      <!-- Agent Cards -->
      <template x-if="!loading && agents.length > 0">
        <div class="grid grid-cols-3 gap-4">
          <template x-for="agent in agents" :key="agent.id">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 flex flex-col hover:border-gray-700 transition-colors group">

              <!-- Card Header -->
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 bg-indigo-600/15 rounded-xl flex items-center justify-center flex-shrink-0">
                  <i data-lucide="bot" class="w-5 h-5 text-indigo-400"></i>
                </div>
                <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                  <!-- Model Pill -->
                  <template x-if="agent.llm_model">
                    <span class="text-[10px] font-medium text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded-full" x-text="agent.llm_model.split('-').slice(0,2).join('-')"></span>
                  </template>
                </div>
              </div>

              <!-- Agent Name -->
              <h3 class="text-base font-semibold text-gray-100 mb-1" x-text="agent.name"></h3>

              <!-- Model -->
              <template x-if="agent.llm_model">
                <p class="text-xs text-gray-500 mb-1 flex items-center gap-1">
                  <i data-lucide="cpu" class="w-3 h-3 inline-block"></i>
                  <span x-text="agent.llm_model"></span>
                </p>
              </template>
              <template x-if="!agent.llm_model">
                <p class="text-xs text-gray-600 mb-1 italic">Default model</p>
              </template>

              <!-- Voice ID -->
              <template x-if="agent.voice_id">
                <p class="text-xs text-gray-500 mb-3 flex items-center gap-1 font-mono">
                  <i data-lucide="mic-2" class="w-3 h-3 flex-shrink-0"></i>
                  <span class="truncate" x-text="agent.voice_id"></span>
                </p>
              </template>
              <template x-if="!agent.voice_id">
                <p class="text-xs text-gray-600 mb-3 italic">Default voice</p>
              </template>

              <!-- Created At -->
              <p class="text-[11px] text-gray-600 mb-4 flex items-center gap-1">
                <i data-lucide="calendar" class="w-3 h-3"></i>
                Created <span x-text="formatDate(agent.created_at)" class="ml-1"></span>
              </p>

              <!-- Actions -->
              <div class="mt-auto flex items-center gap-2">
                <button
                  @click="openModal(agent)"
                  class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-300 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors flex-1 justify-center">
                  <i data-lucide="pencil" class="w-3 h-3"></i> Edit
                </button>

                <!-- Delete — inline confirm -->
                <template x-if="confirmDeleteId !== agent.id">
                  <button
                    @click="confirmDeleteId = agent.id"
                    class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-400 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-colors flex-1 justify-center">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Delete
                  </button>
                </template>
                <template x-if="confirmDeleteId === agent.id">
                  <div class="flex gap-1 flex-1">
                    <button
                      @click="deleteAgent(agent.id)"
                      :disabled="deleteLoading"
                      class="flex-1 flex items-center justify-center gap-1 px-2 py-1.5 text-xs font-medium text-red-400 bg-red-500/10 hover:bg-red-500/20 rounded-lg transition-colors">
                      <span x-show="deleteLoading && confirmDeleteId === agent.id">
                        <svg class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24">
                          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                      </span>
                      <span x-show="!deleteLoading || confirmDeleteId !== agent.id">Confirm</span>
                    </button>
                    <button
                      @click="confirmDeleteId = null"
                      class="px-2 py-1.5 text-xs font-medium text-gray-500 hover:text-gray-300 bg-gray-800 hover:bg-gray-700 rounded-lg transition-colors">
                      No
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
      </template>

    </main>
  </div>

  <script>
    const API = '';

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `flex items-start gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium max-w-sm border ${
        type === 'success'
          ? 'bg-gray-900 border-emerald-500/40 text-emerald-300'
          : 'bg-gray-900 border-red-500/40 text-red-300'
      }`;
      toast.innerHTML = `
        <span class="flex-shrink-0 mt-0.5">${type === 'success' ? '✓' : '✕'}</span>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    async function apiFetch(url, options = {}) {
      try {
        const res = await fetch(API + url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
        return res.status === 204 ? null : await res.json();
      } catch (e) {
        showToast(e.message, 'error');
        throw e;
      }
    }

    function agentsApp() {
      return {
        apiStatus: 'unknown',
        loading: true,
        formLoading: false,
        deleteLoading: false,
        agents: [],
        voices: [],
        showModal: false,
        editingAgent: null,
        confirmDeleteId: null,
        form: {
          name: '',
          system_prompt: '',
          voice_id: '',
          llm_model: ''
        },

        async init() {
          await this.checkHealth();
          await Promise.all([this.loadAgents(), this.loadVoices()]);
          lucide.createIcons();
        },

        async loadVoices() {
          try {
            this.voices = await apiFetch('/agents/options/voices') || [];
          } catch {
            this.voices = [];
          }
        },

        async checkHealth() {
          try {
            await apiFetch('/health');
            this.apiStatus = 'connected';
          } catch {
            this.apiStatus = 'offline';
          }
        },

        async loadAgents() {
          this.loading = true;
          try {
            this.agents = await apiFetch('/agents') || [];
          } catch {
            this.agents = [];
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        openModal(agent = null) {
          this.editingAgent = agent;
          if (agent) {
            this.form = {
              name: agent.name || '',
              system_prompt: agent.system_prompt || '',
              voice_id: agent.voice_id || '',
              llm_model: agent.llm_model || ''
            };
          } else {
            this.form = { name: '', system_prompt: '', voice_id: '', llm_model: '' };
          }
          this.showModal = true;
          this.$nextTick(() => lucide.createIcons());
        },

        closeModal() {
          this.showModal = false;
          this.editingAgent = null;
          this.form = { name: '', system_prompt: '', voice_id: '', llm_model: '' };
        },

        async saveAgent() {
          this.formLoading = true;
          try {
            const body = { name: this.form.name, system_prompt: this.form.system_prompt };
            if (this.form.voice_id.trim()) body.voice_id = this.form.voice_id.trim();
            if (this.form.llm_model) body.llm_model = this.form.llm_model;

            if (this.editingAgent) {
              await apiFetch(`/agents/${this.editingAgent.id}`, {
                method: 'PATCH',
                body: JSON.stringify(body)
              });
              showToast(`Agent "${this.form.name}" updated`, 'success');
            } else {
              await apiFetch('/agents', {
                method: 'POST',
                body: JSON.stringify(body)
              });
              showToast(`Agent "${this.form.name}" created`, 'success');
            }
            this.closeModal();
            await this.loadAgents();
          } catch {
            // Error shown by apiFetch
          } finally {
            this.formLoading = false;
          }
        },

        async deleteAgent(id) {
          this.deleteLoading = true;
          try {
            await apiFetch(`/agents/${id}`, { method: 'DELETE' });
            showToast('Agent deleted', 'success');
            this.confirmDeleteId = null;
            await this.loadAgents();
          } catch {
            // Error shown by apiFetch
          } finally {
            this.deleteLoading = false;
          }
        },

        formatDate(dateStr) {
          if (!dateStr) return 'Unknown';
          return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
