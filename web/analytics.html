<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — VoiceAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans" x-data="analyticsApp()" x-init="init()">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-screen w-56 bg-gray-900 border-r border-gray-800 flex flex-col z-40">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-800">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i data-lucide="mic" class="w-4 h-4 text-white"></i>
      </div>
      <span class="font-bold text-lg text-gray-100 tracking-tight">VoiceAI</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="/agents.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="bot" class="w-4 h-4"></i> Agents
      </a>
      <a href="/calls.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="phone" class="w-4 h-4"></i> Calls
      </a>
      <a href="/analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-600/20 text-indigo-400 font-medium text-sm">
        <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
      </a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-800">
      <p class="text-xs text-gray-500">VoiceAI Platform</p>
      <p class="text-xs text-gray-600">v1.0.0</p>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="ml-56 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-100">Analytics</h1>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-500">Computed from live call data</span>
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium"
          :class="apiStatus === 'connected' ? 'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/30' : 'bg-red-500/10 text-red-400 ring-1 ring-red-500/30'">
          <span class="w-1.5 h-1.5 rounded-full" :class="apiStatus === 'connected' ? 'bg-emerald-400' : 'bg-red-400'"></span>
          <span x-text="apiStatus === 'connected' ? 'API Connected' : 'API Offline'"></span>
        </span>
      </div>
    </header>

    <main class="p-8 flex-1">

      <!-- Loading Skeleton for summary cards -->
      <template x-if="loading">
        <div class="grid grid-cols-4 gap-4 mb-8">
          <template x-for="i in 4" :key="i">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
              <div class="h-3 w-24 bg-gray-800 rounded animate-pulse mb-4"></div>
              <div class="h-8 w-20 bg-gray-800 rounded animate-pulse mb-2"></div>
              <div class="h-2 w-16 bg-gray-800 rounded animate-pulse"></div>
            </div>
          </template>
        </div>
      </template>

      <!-- Summary Cards -->
      <template x-if="!loading">
        <div class="grid grid-cols-4 gap-4 mb-8">

          <!-- Total Calls -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm text-gray-400 font-medium">Total Calls</p>
              <div class="w-8 h-8 bg-indigo-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="phone-call" class="w-4 h-4 text-indigo-400"></i>
              </div>
            </div>
            <p class="text-3xl font-bold text-gray-100" x-text="summary.totalCalls"></p>
            <p class="text-xs text-gray-500 mt-1">all time</p>
          </div>

          <!-- Total Minutes -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm text-gray-400 font-medium">Total Minutes</p>
              <div class="w-8 h-8 bg-emerald-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="clock" class="w-4 h-4 text-emerald-400"></i>
              </div>
            </div>
            <p class="text-3xl font-bold text-gray-100" x-text="summary.totalMinutes"></p>
            <p class="text-xs text-gray-500 mt-1">minutes of conversation</p>
          </div>

          <!-- Total Cost -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm text-gray-400 font-medium">Total Cost</p>
              <div class="w-8 h-8 bg-amber-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="dollar-sign" class="w-4 h-4 text-amber-400"></i>
              </div>
            </div>
            <p class="text-3xl font-bold text-gray-100">$<span x-text="summary.totalCost"></span></p>
            <p class="text-xs text-gray-500 mt-1">across all calls</p>
          </div>

          <!-- Avg Latency -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <div class="flex items-center justify-between mb-3">
              <p class="text-sm text-gray-400 font-medium">Avg Latency</p>
              <div class="w-8 h-8 bg-purple-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="zap" class="w-4 h-4 text-purple-400"></i>
              </div>
            </div>
            <p class="text-3xl font-bold text-gray-100"><span x-text="summary.avgLatency"></span><span class="text-lg text-gray-400 ml-1">ms</span></p>
            <p class="text-xs text-gray-500 mt-1">end-to-end avg</p>
          </div>
        </div>
      </template>

      <!-- Charts Row -->
      <template x-if="!loading">
        <div class="grid grid-cols-3 gap-6 mb-8">

          <!-- Line Chart: Calls per Day -->
          <div class="col-span-2 bg-gray-900 border border-gray-800 rounded-xl p-6">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h3 class="text-sm font-semibold text-gray-100">Calls per Day</h3>
                <p class="text-xs text-gray-500 mt-0.5">Last 14 days</p>
              </div>
              <div class="w-8 h-8 bg-indigo-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="trending-up" class="w-4 h-4 text-indigo-400"></i>
              </div>
            </div>
            <div class="relative h-52">
              <canvas id="callsPerDayChart"></canvas>
            </div>
          </div>

          <!-- Doughnut: Call Outcomes -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h3 class="text-sm font-semibold text-gray-100">Call Outcomes</h3>
                <p class="text-xs text-gray-500 mt-0.5">Status distribution</p>
              </div>
              <div class="w-8 h-8 bg-emerald-500/10 rounded-lg flex items-center justify-center">
                <i data-lucide="pie-chart" class="w-4 h-4 text-emerald-400"></i>
              </div>
            </div>
            <div class="relative h-40">
              <canvas id="outcomesChart"></canvas>
            </div>
            <!-- Legend -->
            <div class="mt-4 space-y-1.5">
              <template x-for="(item, idx) in outcomeLegend" :key="idx">
                <div class="flex items-center justify-between">
                  <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full flex-shrink-0" :style="`background: ${item.color}`"></span>
                    <span class="text-xs text-gray-400 capitalize" x-text="item.label"></span>
                  </div>
                  <span class="text-xs font-medium text-gray-300" x-text="item.count"></span>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>

      <!-- Bar Chart: Cost per Call -->
      <template x-if="!loading">
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-8">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h3 class="text-sm font-semibold text-gray-100">Cost Breakdown — Last 20 Calls</h3>
              <p class="text-xs text-gray-500 mt-0.5">Cost per call in cents</p>
            </div>
            <div class="w-8 h-8 bg-amber-500/10 rounded-lg flex items-center justify-center">
              <i data-lucide="bar-chart-2" class="w-4 h-4 text-amber-400"></i>
            </div>
          </div>
          <div class="relative h-52">
            <canvas id="costChart"></canvas>
          </div>
        </div>
      </template>

      <!-- Cost Breakdown Table -->
      <template x-if="!loading">
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
            <div>
              <h3 class="text-sm font-semibold text-gray-100">Cost Breakdown by Call</h3>
              <p class="text-xs text-gray-500 mt-0.5">STT $0.0065/min · LLM $0.004/min · TTS $0.024/min · Telephony $0.004/min</p>
            </div>
          </div>

          <template x-if="costBreakdown.length === 0">
            <div class="flex flex-col items-center justify-center py-12">
              <i data-lucide="receipt" class="w-8 h-8 text-gray-700 mb-3"></i>
              <p class="text-sm text-gray-500">No completed calls with duration data yet</p>
            </div>
          </template>

          <template x-if="costBreakdown.length > 0">
            <div class="overflow-x-auto">
              <table class="w-full text-xs">
                <thead>
                  <tr class="border-b border-gray-800">
                    <th class="text-left px-6 py-3 font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                    <th class="text-left px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Duration</th>
                    <th class="text-right px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">STT</th>
                    <th class="text-right px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">LLM</th>
                    <th class="text-right px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">TTS</th>
                    <th class="text-right px-4 py-3 font-medium text-gray-500 uppercase tracking-wider">Telephony</th>
                    <th class="text-right px-6 py-3 font-medium text-gray-500 uppercase tracking-wider">Total</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-800/50">
                  <template x-for="row in costBreakdown" :key="row.id">
                    <tr class="hover:bg-gray-800/30 transition-colors">
                      <td class="px-6 py-3 font-mono text-gray-300" x-text="row.phone"></td>
                      <td class="px-4 py-3 text-gray-400" x-text="row.duration"></td>
                      <td class="px-4 py-3 text-right text-gray-400" x-text="'$' + row.stt"></td>
                      <td class="px-4 py-3 text-right text-gray-400" x-text="'$' + row.llm"></td>
                      <td class="px-4 py-3 text-right text-gray-400" x-text="'$' + row.tts"></td>
                      <td class="px-4 py-3 text-right text-gray-400" x-text="'$' + row.telephony"></td>
                      <td class="px-6 py-3 text-right font-semibold text-gray-200" x-text="'$' + row.total"></td>
                    </tr>
                  </template>
                  <!-- Totals row -->
                  <tr class="bg-gray-800/30 border-t border-gray-700">
                    <td class="px-6 py-3 font-semibold text-gray-300">Total</td>
                    <td class="px-4 py-3 text-gray-400" x-text="grandTotals.duration"></td>
                    <td class="px-4 py-3 text-right font-semibold text-gray-300" x-text="'$' + grandTotals.stt"></td>
                    <td class="px-4 py-3 text-right font-semibold text-gray-300" x-text="'$' + grandTotals.llm"></td>
                    <td class="px-4 py-3 text-right font-semibold text-gray-300" x-text="'$' + grandTotals.tts"></td>
                    <td class="px-4 py-3 text-right font-semibold text-gray-300" x-text="'$' + grandTotals.telephony"></td>
                    <td class="px-6 py-3 text-right font-bold text-indigo-400" x-text="'$' + grandTotals.total"></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </template>
        </div>
      </template>

    </main>
  </div>

  <script>
    const API = '';

    // Chart.js global defaults for dark theme
    Chart.defaults.color = '#6b7280';
    Chart.defaults.borderColor = '#1f2937';
    Chart.defaults.font.family = 'Inter, sans-serif';
    Chart.defaults.font.size = 11;

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `flex items-start gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium max-w-sm border ${
        type === 'success'
          ? 'bg-gray-900 border-emerald-500/40 text-emerald-300'
          : 'bg-gray-900 border-red-500/40 text-red-300'
      }`;
      toast.innerHTML = `
        <span class="flex-shrink-0 mt-0.5">${type === 'success' ? '✓' : '✕'}</span>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    async function apiFetch(url, options = {}) {
      try {
        const res = await fetch(API + url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
        return res.status === 204 ? null : await res.json();
      } catch (e) {
        showToast(e.message, 'error');
        throw e;
      }
    }

    // Cost rates per minute (in dollars)
    const RATES = {
      stt: 0.0065,
      llm: 0.004,
      tts: 0.024,
      telephony: 0.004
    };

    function computeCallCosts(durationSeconds) {
      const mins = (durationSeconds || 0) / 60;
      return {
        stt: (mins * RATES.stt).toFixed(4),
        llm: (mins * RATES.llm).toFixed(4),
        tts: (mins * RATES.tts).toFixed(4),
        telephony: (mins * RATES.telephony).toFixed(4),
        total: (mins * (RATES.stt + RATES.llm + RATES.tts + RATES.telephony)).toFixed(4)
      };
    }

    function analyticsApp() {
      return {
        apiStatus: 'unknown',
        loading: true,
        calls: [],
        outcomeLegend: [],
        costBreakdown: [],
        grandTotals: {},
        summary: {
          totalCalls: 0,
          totalMinutes: 0,
          totalCost: '0.00',
          avgLatency: '—'
        },
        charts: {},

        async init() {
          await this.checkHealth();
          await this.loadData();
          lucide.createIcons();
        },

        async checkHealth() {
          try {
            await apiFetch('/health');
            this.apiStatus = 'connected';
          } catch {
            this.apiStatus = 'offline';
          }
        },

        async loadData() {
          this.loading = true;
          try {
            const data = await apiFetch('/calls?page=1&limit=100') || {};
            this.calls = data.items || [];
            this.computeSummary();
            this.computeCostBreakdown();
            this.loading = false;
            // Wait for DOM then render charts
            await this.$nextTick();
            this.renderCharts();
            lucide.createIcons();
          } catch {
            this.calls = [];
            this.loading = false;
          }
        },

        computeSummary() {
          const calls = this.calls;
          this.summary.totalCalls = calls.length;

          const totalSeconds = calls.reduce((s, c) => s + (c.duration_seconds || 0), 0);
          this.summary.totalMinutes = (totalSeconds / 60).toFixed(1);

          const totalCostCents = calls.reduce((s, c) => s + (c.cost_cents || 0), 0);
          this.summary.totalCost = (totalCostCents / 100).toFixed(2);

          const withLatency = calls.filter(c => c.avg_latency_ms);
          this.summary.avgLatency = withLatency.length
            ? Math.round(withLatency.reduce((s, c) => s + c.avg_latency_ms, 0) / withLatency.length)
            : '—';
        },

        computeCostBreakdown() {
          const calls = this.calls.filter(c => c.duration_seconds != null && c.duration_seconds > 0);

          this.costBreakdown = calls.slice(0, 20).map(c => {
            const costs = computeCallCosts(c.duration_seconds);
            const mins = Math.floor(c.duration_seconds / 60);
            const secs = c.duration_seconds % 60;
            return {
              id: c.id,
              phone: c.to_number || c.from_number || '—',
              duration: mins > 0 ? `${mins}m ${secs}s` : `${secs}s`,
              ...costs
            };
          });

          if (this.costBreakdown.length > 0) {
            const totalSecs = calls.slice(0, 20).reduce((s, c) => s + (c.duration_seconds || 0), 0);
            const totalMins = Math.floor(totalSecs / 60);
            const totalSecsR = totalSecs % 60;
            const totals = computeCallCosts(totalSecs);
            this.grandTotals = {
              duration: totalMins > 0 ? `${totalMins}m ${totalSecsR}s` : `${totalSecsR}s`,
              ...totals
            };
          }
        },

        renderCharts() {
          // Destroy existing charts if re-rendering
          Object.values(this.charts).forEach(c => c.destroy());
          this.charts = {};

          this.renderCallsPerDayChart();
          this.renderCostChart();
          this.renderOutcomesChart();
        },

        renderCallsPerDayChart() {
          const canvas = document.getElementById('callsPerDayChart');
          if (!canvas) return;

          // Build last 14 days
          const days = [];
          const counts = [];
          for (let i = 13; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            days.push(label);
            const dayStr = d.toDateString();
            counts.push(this.calls.filter(c => c.started_at && new Date(c.started_at).toDateString() === dayStr).length);
          }

          this.charts.callsPerDay = new Chart(canvas, {
            type: 'line',
            data: {
              labels: days,
              datasets: [{
                label: 'Calls',
                data: counts,
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99, 102, 241, 0.08)',
                borderWidth: 2,
                pointBackgroundColor: '#6366f1',
                pointBorderColor: '#1e1b4b',
                pointRadius: 4,
                pointHoverRadius: 6,
                tension: 0.4,
                fill: true
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#111827',
                  borderColor: '#374151',
                  borderWidth: 1,
                  titleColor: '#f3f4f6',
                  bodyColor: '#9ca3af',
                  callbacks: {
                    label: ctx => ` ${ctx.parsed.y} calls`
                  }
                }
              },
              scales: {
                x: {
                  grid: { color: '#1f2937' },
                  ticks: { color: '#6b7280', maxTicksLimit: 7 }
                },
                y: {
                  grid: { color: '#1f2937' },
                  ticks: { color: '#6b7280', stepSize: 1 },
                  beginAtZero: true
                }
              }
            }
          });
        },

        renderCostChart() {
          const canvas = document.getElementById('costChart');
          if (!canvas) return;

          const last20 = this.calls.slice(0, 20);
          const labels = last20.map((c, i) => c.to_number || c.from_number || `Call ${i + 1}`);
          const data = last20.map(c => c.cost_cents || 0);

          this.charts.cost = new Chart(canvas, {
            type: 'bar',
            data: {
              labels,
              datasets: [{
                label: 'Cost (¢)',
                data,
                backgroundColor: 'rgba(245, 158, 11, 0.25)',
                borderColor: '#f59e0b',
                borderWidth: 1,
                borderRadius: 4
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#111827',
                  borderColor: '#374151',
                  borderWidth: 1,
                  titleColor: '#f3f4f6',
                  bodyColor: '#9ca3af',
                  callbacks: {
                    label: ctx => ` ${ctx.parsed.y}¢`
                  }
                }
              },
              scales: {
                x: {
                  grid: { display: false },
                  ticks: {
                    color: '#6b7280',
                    maxRotation: 30,
                    callback: function(val, idx) {
                      const label = this.getLabelForValue(val);
                      return label.length > 12 ? label.slice(-10) : label;
                    }
                  }
                },
                y: {
                  grid: { color: '#1f2937' },
                  ticks: { color: '#6b7280' },
                  beginAtZero: true
                }
              }
            }
          });
        },

        renderOutcomesChart() {
          const canvas = document.getElementById('outcomesChart');
          if (!canvas) return;

          const statuses = ['completed', 'failed', 'active', 'dialing'];
          const colors = {
            completed: '#10b981',
            failed: '#ef4444',
            active: '#6366f1',
            dialing: '#f59e0b'
          };

          const counts = {};
          statuses.forEach(s => { counts[s] = this.calls.filter(c => c.status === s).length; });

          const nonZero = statuses.filter(s => counts[s] > 0);
          const data = nonZero.map(s => counts[s]);
          const bgColors = nonZero.map(s => colors[s] + '80');
          const borderColors = nonZero.map(s => colors[s]);

          this.outcomeLegend = nonZero.map(s => ({
            label: s,
            count: counts[s],
            color: colors[s]
          }));

          if (data.length === 0) {
            this.outcomeLegend = [];
            return;
          }

          this.charts.outcomes = new Chart(canvas, {
            type: 'doughnut',
            data: {
              labels: nonZero,
              datasets: [{
                data,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 2,
                hoverOffset: 4
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              cutout: '70%',
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#111827',
                  borderColor: '#374151',
                  borderWidth: 1,
                  titleColor: '#f3f4f6',
                  bodyColor: '#9ca3af',
                  callbacks: {
                    label: ctx => ` ${ctx.label}: ${ctx.parsed} calls`
                  }
                }
              }
            }
          });
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
