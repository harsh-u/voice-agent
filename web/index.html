<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — VoiceAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans" x-data="dashboardApp()" x-init="init()">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-screen w-56 bg-gray-900 border-r border-gray-800 flex flex-col z-40">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-800">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i data-lucide="mic" class="w-4 h-4 text-white"></i>
      </div>
      <span class="font-bold text-lg text-gray-100 tracking-tight">VoiceAI</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-600/20 text-indigo-400 font-medium text-sm">
        <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="/agents.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="bot" class="w-4 h-4"></i> Agents
      </a>
      <a href="/calls.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="phone" class="w-4 h-4"></i> Calls
      </a>
      <a href="/analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
      </a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-800">
      <p class="text-xs text-gray-500">VoiceAI Platform</p>
      <p class="text-xs text-gray-600">v1.0.0</p>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="ml-56 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-100">Dashboard</h1>
      <div class="flex items-center gap-2">
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium"
          :class="apiStatus === 'connected' ? 'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/30' : 'bg-red-500/10 text-red-400 ring-1 ring-red-500/30'">
          <span class="w-1.5 h-1.5 rounded-full" :class="apiStatus === 'connected' ? 'bg-emerald-400' : 'bg-red-400'"></span>
          <span x-text="apiStatus === 'connected' ? 'API Connected' : 'API Offline'"></span>
        </span>
      </div>
    </header>

    <main class="p-8 flex-1">

      <!-- Stats Row -->
      <div class="grid grid-cols-4 gap-4 mb-8">
        <!-- Total Calls Today -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <template x-if="statsLoading">
            <div>
              <div class="h-3 w-24 bg-gray-800 rounded animate-pulse mb-3"></div>
              <div class="h-8 w-16 bg-gray-800 rounded animate-pulse"></div>
            </div>
          </template>
          <template x-if="!statsLoading">
            <div>
              <div class="flex items-center justify-between mb-3">
                <p class="text-sm text-gray-400 font-medium">Total Calls Today</p>
                <div class="w-8 h-8 bg-indigo-500/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="phone-call" class="w-4 h-4 text-indigo-400"></i>
                </div>
              </div>
              <p class="text-3xl font-bold text-gray-100" x-text="stats.totalToday"></p>
              <p class="text-xs text-gray-500 mt-1">calls placed today</p>
            </div>
          </template>
        </div>

        <!-- Active Calls -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <template x-if="statsLoading">
            <div>
              <div class="h-3 w-24 bg-gray-800 rounded animate-pulse mb-3"></div>
              <div class="h-8 w-16 bg-gray-800 rounded animate-pulse"></div>
            </div>
          </template>
          <template x-if="!statsLoading">
            <div>
              <div class="flex items-center justify-between mb-3">
                <p class="text-sm text-gray-400 font-medium">Active Calls</p>
                <div class="w-8 h-8 bg-emerald-500/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="activity" class="w-4 h-4 text-emerald-400"></i>
                </div>
              </div>
              <p class="text-3xl font-bold text-gray-100">
                <span x-text="stats.activeCalls"></span>
                <span x-show="stats.activeCalls > 0" class="inline-block w-2 h-2 bg-emerald-400 rounded-full ml-2 animate-pulse"></span>
              </p>
              <p class="text-xs text-gray-500 mt-1">live right now</p>
            </div>
          </template>
        </div>

        <!-- Avg Latency -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <template x-if="statsLoading">
            <div>
              <div class="h-3 w-24 bg-gray-800 rounded animate-pulse mb-3"></div>
              <div class="h-8 w-16 bg-gray-800 rounded animate-pulse"></div>
            </div>
          </template>
          <template x-if="!statsLoading">
            <div>
              <div class="flex items-center justify-between mb-3">
                <p class="text-sm text-gray-400 font-medium">Avg Latency</p>
                <div class="w-8 h-8 bg-amber-500/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="zap" class="w-4 h-4 text-amber-400"></i>
                </div>
              </div>
              <p class="text-3xl font-bold text-gray-100"><span x-text="stats.avgLatency"></span><span class="text-lg font-medium text-gray-400 ml-1">ms</span></p>
              <p class="text-xs text-gray-500 mt-1">end-to-end avg</p>
            </div>
          </template>
        </div>

        <!-- Avg Cost -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
          <template x-if="statsLoading">
            <div>
              <div class="h-3 w-24 bg-gray-800 rounded animate-pulse mb-3"></div>
              <div class="h-8 w-16 bg-gray-800 rounded animate-pulse"></div>
            </div>
          </template>
          <template x-if="!statsLoading">
            <div>
              <div class="flex items-center justify-between mb-3">
                <p class="text-sm text-gray-400 font-medium">Avg Cost / Call</p>
                <div class="w-8 h-8 bg-purple-500/10 rounded-lg flex items-center justify-center">
                  <i data-lucide="dollar-sign" class="w-4 h-4 text-purple-400"></i>
                </div>
              </div>
              <p class="text-3xl font-bold text-gray-100"><span x-text="stats.avgCost"></span><span class="text-lg font-medium text-gray-400 ml-1">¢</span></p>
              <p class="text-xs text-gray-500 mt-1">cents per call</p>
            </div>
          </template>
        </div>
      </div>

      <!-- Two-column layout: Make a Call + Recent Calls -->
      <div class="grid grid-cols-5 gap-6">

        <!-- Make a Call Panel -->
        <div class="col-span-2 bg-gray-900 border border-gray-800 rounded-xl p-6">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-9 h-9 bg-indigo-600/20 rounded-lg flex items-center justify-center">
              <i data-lucide="phone-outgoing" class="w-5 h-5 text-indigo-400"></i>
            </div>
            <h2 class="text-base font-semibold text-gray-100">Make a Call</h2>
          </div>

          <form @submit.prevent="makeCall()">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Phone Number</label>
                <input
                  x-model="callForm.toNumber"
                  type="text"
                  placeholder="+1 (555) 000-0000 — E.164 format"
                  class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                  required
                />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-1.5">Agent</label>
                <select
                  x-model="callForm.agentId"
                  class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition appearance-none cursor-pointer">
                  <option value="">Use default agent</option>
                  <template x-for="agent in agents" :key="agent.id">
                    <option :value="agent.id" x-text="agent.name"></option>
                  </template>
                </select>
              </div>
              <button
                type="submit"
                :disabled="callLoading"
                class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition flex items-center justify-center gap-2">
                <span x-show="callLoading">
                  <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                  </svg>
                </span>
                <i x-show="!callLoading" data-lucide="phone-call" class="w-4 h-4"></i>
                <span x-text="callLoading ? 'Dialing...' : 'Start Call'"></span>
              </button>
            </div>
          </form>
        </div>

        <!-- Recent Calls Table -->
        <div class="col-span-3 bg-gray-900 border border-gray-800 rounded-xl">
          <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
            <h2 class="text-base font-semibold text-gray-100">Recent Calls</h2>
            <a href="/calls.html" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium flex items-center gap-1 transition-colors">
              View all <i data-lucide="arrow-right" class="w-3 h-3"></i>
            </a>
          </div>

          <!-- Loading skeleton -->
          <template x-if="callsLoading">
            <div class="p-6 space-y-3">
              <template x-for="i in 5" :key="i">
                <div class="flex items-center gap-4">
                  <div class="h-4 w-32 bg-gray-800 rounded animate-pulse"></div>
                  <div class="h-4 w-16 bg-gray-800 rounded animate-pulse"></div>
                  <div class="h-4 w-20 bg-gray-800 rounded animate-pulse"></div>
                  <div class="h-4 w-12 bg-gray-800 rounded animate-pulse ml-auto"></div>
                </div>
              </template>
            </div>
          </template>

          <!-- Empty state -->
          <template x-if="!callsLoading && recentCalls.length === 0">
            <div class="flex flex-col items-center justify-center py-16 px-6">
              <div class="w-14 h-14 bg-gray-800 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="phone-off" class="w-6 h-6 text-gray-600"></i>
              </div>
              <p class="text-sm font-medium text-gray-400">No calls yet</p>
              <p class="text-xs text-gray-600 mt-1">Make your first call above</p>
            </div>
          </template>

          <!-- Calls Table -->
          <template x-if="!callsLoading && recentCalls.length > 0">
            <div>
              <table class="w-full text-sm">
                <thead>
                  <tr class="border-b border-gray-800">
                    <th class="text-left px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                    <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Dir</th>
                    <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                    <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Dur.</th>
                    <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Cost</th>
                    <th class="text-left px-4 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="call in recentCalls" :key="call.id">
                    <template>
                      <tr
                        @click="toggleTranscript(call.id)"
                        class="border-b border-gray-800/50 hover:bg-gray-800/40 cursor-pointer transition-colors">
                        <td class="px-6 py-3 font-mono text-gray-300 text-xs" x-text="call.to_number || call.from_number || '—'"></td>
                        <td class="px-4 py-3">
                          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium"
                            :class="call.direction === 'outbound' ? 'bg-indigo-500/10 text-indigo-400' : 'bg-purple-500/10 text-purple-400'">
                            <i :data-lucide="call.direction === 'outbound' ? 'arrow-up-right' : 'arrow-down-left'" class="w-3 h-3"></i>
                            <span x-text="call.direction || '—'"></span>
                          </span>
                        </td>
                        <td class="px-4 py-3">
                          <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-xs font-medium"
                            :class="{
                              'bg-amber-500/10 text-amber-400': call.status === 'dialing',
                              'bg-emerald-500/10 text-emerald-400': call.status === 'active',
                              'bg-gray-700/50 text-gray-400': call.status === 'completed',
                              'bg-red-500/10 text-red-400': call.status === 'failed'
                            }">
                            <span class="w-1.5 h-1.5 rounded-full"
                              :class="{
                                'bg-amber-400 animate-pulse': call.status === 'dialing',
                                'bg-emerald-400 animate-pulse': call.status === 'active',
                                'bg-gray-400': call.status === 'completed',
                                'bg-red-400': call.status === 'failed'
                              }"></span>
                            <span x-text="call.status || '—'"></span>
                          </span>
                        </td>
                        <td class="px-4 py-3 text-gray-400 text-xs" x-text="formatDuration(call.duration_seconds)"></td>
                        <td class="px-4 py-3 text-gray-400 text-xs" x-text="call.cost_cents != null ? call.cost_cents + '¢' : '—'"></td>
                        <td class="px-4 py-3 text-gray-500 text-xs" x-text="timeAgo(call.started_at)"></td>
                      </tr>
                      <tr x-show="expandedCallId === call.id" class="bg-gray-800/30">
                        <td colspan="6" class="px-6 py-4">
                          <template x-if="transcriptLoading && expandedCallId === call.id">
                            <div class="space-y-2">
                              <div class="h-4 w-3/4 bg-gray-800 rounded animate-pulse"></div>
                              <div class="h-4 w-1/2 bg-gray-800 rounded animate-pulse ml-auto"></div>
                              <div class="h-4 w-2/3 bg-gray-800 rounded animate-pulse"></div>
                            </div>
                          </template>
                          <template x-if="!transcriptLoading && transcriptData && expandedCallId === call.id">
                            <div>
                              <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Transcript</p>
                              <template x-if="!transcriptData.turns || transcriptData.turns.length === 0">
                                <p class="text-sm text-gray-500 italic">No transcript available yet.</p>
                              </template>
                              <div class="space-y-2 max-h-48 overflow-y-auto pr-2">
                                <template x-for="(turn, idx) in (transcriptData.turns || [])" :key="idx">
                                  <div class="flex" :class="turn.role === 'assistant' ? 'justify-end' : 'justify-start'">
                                    <div class="max-w-xs px-3 py-2 rounded-xl text-xs"
                                      :class="turn.role === 'assistant' ? 'bg-indigo-600/30 text-indigo-200' : 'bg-gray-700 text-gray-300'">
                                      <p x-text="turn.text"></p>
                                      <p x-show="turn.role === 'assistant' && turn.latency_ms" class="text-indigo-400/70 text-[10px] mt-1 text-right" x-text="turn.latency_ms + 'ms'"></p>
                                    </div>
                                  </div>
                                </template>
                              </div>
                            </div>
                          </template>
                        </td>
                      </tr>
                    </template>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>

      </div>
    </main>
  </div>

  <script>
    const API = '';

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `flex items-start gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium max-w-sm transition-all duration-300 border ${
        type === 'success'
          ? 'bg-gray-900 border-emerald-500/40 text-emerald-300'
          : 'bg-gray-900 border-red-500/40 text-red-300'
      }`;
      toast.innerHTML = `
        <span class="flex-shrink-0 mt-0.5">${type === 'success' ? '✓' : '✕'}</span>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    async function apiFetch(url, options = {}) {
      try {
        const res = await fetch(API + url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
        return res.status === 204 ? null : await res.json();
      } catch (e) {
        showToast(e.message, 'error');
        throw e;
      }
    }

    function dashboardApp() {
      return {
        apiStatus: 'unknown',
        statsLoading: true,
        callsLoading: true,
        callLoading: false,
        transcriptLoading: false,
        agents: [],
        recentCalls: [],
        expandedCallId: null,
        transcriptData: null,
        stats: {
          totalToday: 0,
          activeCalls: 0,
          avgLatency: '—',
          avgCost: '—'
        },
        callForm: {
          toNumber: '',
          agentId: ''
        },
        pollInterval: null,

        async init() {
          await this.checkHealth();
          await Promise.all([this.loadAgents(), this.loadCalls()]);
          lucide.createIcons();
          this.startPolling();
        },

        async checkHealth() {
          try {
            const data = await apiFetch('/health');
            this.apiStatus = data && data.status ? 'connected' : 'connected';
          } catch {
            this.apiStatus = 'offline';
          }
        },

        async loadAgents() {
          try {
            this.agents = await apiFetch('/agents') || [];
          } catch {
            this.agents = [];
          }
        },

        async loadCalls() {
          this.callsLoading = true;
          try {
            const data = await apiFetch('/calls?page=1&limit=100') || {};
            const calls = data.items || [];
            this.recentCalls = calls.slice(0, 10);
            this.computeStats(calls);
          } catch {
            this.recentCalls = [];
          } finally {
            this.callsLoading = false;
            this.statsLoading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        computeStats(calls) {
          const today = new Date().toDateString();
          const todayCalls = calls.filter(c => c.started_at && new Date(c.started_at).toDateString() === today);
          this.stats.totalToday = todayCalls.length;
          this.stats.activeCalls = calls.filter(c => c.status === 'active' || c.status === 'dialing').length;

          const withLatency = calls.filter(c => c.avg_latency_ms);
          this.stats.avgLatency = withLatency.length
            ? Math.round(withLatency.reduce((s, c) => s + c.avg_latency_ms, 0) / withLatency.length)
            : '—';

          const withCost = calls.filter(c => c.cost_cents != null);
          this.stats.avgCost = withCost.length
            ? (withCost.reduce((s, c) => s + c.cost_cents, 0) / withCost.length).toFixed(1)
            : '—';
        },

        async makeCall() {
          if (!this.callForm.toNumber.trim()) return;
          this.callLoading = true;
          try {
            const body = { to_number: this.callForm.toNumber };
            if (this.callForm.agentId) body.agent_config_id = this.callForm.agentId;
            const result = await apiFetch('/calls/outbound', {
              method: 'POST',
              body: JSON.stringify(body)
            });
            showToast(`Call started! ID: ${result.call_id}`, 'success');
            this.callForm.toNumber = '';
            this.callForm.agentId = '';
            // Add as active immediately
            const optimisticCall = {
              id: result.call_id,
              status: result.status || 'dialing',
              direction: 'outbound',
              to_number: body.to_number,
              started_at: new Date().toISOString(),
              duration_seconds: null,
              cost_cents: null
            };
            this.recentCalls.unshift(optimisticCall);
            if (this.recentCalls.length > 10) this.recentCalls.pop();
            this.stats.activeCalls++;
          } catch {
            // Error already shown by apiFetch
          } finally {
            this.callLoading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        async toggleTranscript(callId) {
          if (this.expandedCallId === callId) {
            this.expandedCallId = null;
            this.transcriptData = null;
            return;
          }
          this.expandedCallId = callId;
          this.transcriptLoading = true;
          this.transcriptData = null;
          try {
            this.transcriptData = await apiFetch(`/calls/${callId}`);
          } catch {
            this.transcriptData = { turns: [] };
          } finally {
            this.transcriptLoading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        startPolling() {
          this.pollInterval = setInterval(async () => {
            const hasActive = this.recentCalls.some(c => c.status === 'active' || c.status === 'dialing');
            if (hasActive || true) { // always refresh active count
              await this.loadCalls();
            }
          }, 5000);
        },

        formatDuration(seconds) {
          if (seconds == null) return '—';
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return m > 0 ? `${m}m ${s}s` : `${s}s`;
        },

        timeAgo(dateStr) {
          if (!dateStr) return '—';
          const diff = Date.now() - new Date(dateStr).getTime();
          const mins = Math.floor(diff / 60000);
          if (mins < 1) return 'just now';
          if (mins < 60) return `${mins}m ago`;
          const hrs = Math.floor(mins / 60);
          if (hrs < 24) return `${hrs}h ago`;
          return `${Math.floor(hrs / 24)}d ago`;
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
