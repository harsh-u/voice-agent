<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calls — VoiceAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans" x-data="callsApp()" x-init="init()">

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- Sidebar -->
  <aside class="fixed top-0 left-0 h-screen w-56 bg-gray-900 border-r border-gray-800 flex flex-col z-40">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-800">
      <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
        <i data-lucide="mic" class="w-4 h-4 text-white"></i>
      </div>
      <span class="font-bold text-lg text-gray-100 tracking-tight">VoiceAI</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="layout-grid" class="w-4 h-4"></i> Dashboard
      </a>
      <a href="/agents.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="bot" class="w-4 h-4"></i> Agents
      </a>
      <a href="/calls.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-600/20 text-indigo-400 font-medium text-sm">
        <i data-lucide="phone" class="w-4 h-4"></i> Calls
      </a>
      <a href="/analytics.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:text-gray-100 hover:bg-gray-800 font-medium text-sm transition-colors">
        <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analytics
      </a>
    </nav>
    <div class="px-5 py-4 border-t border-gray-800">
      <p class="text-xs text-gray-500">VoiceAI Platform</p>
      <p class="text-xs text-gray-600">v1.0.0</p>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="ml-56 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="text-xl font-semibold text-gray-100">Call History</h1>
      <div class="flex items-center gap-3">
        <span x-show="hasActive" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/30">
          <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
          Live updating
        </span>
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium"
          :class="apiStatus === 'connected' ? 'bg-emerald-500/10 text-emerald-400 ring-1 ring-emerald-500/30' : 'bg-red-500/10 text-red-400 ring-1 ring-red-500/30'">
          <span class="w-1.5 h-1.5 rounded-full" :class="apiStatus === 'connected' ? 'bg-emerald-400' : 'bg-red-400'"></span>
          <span x-text="apiStatus === 'connected' ? 'API Connected' : 'API Offline'"></span>
        </span>
      </div>
    </header>

    <main class="p-8 flex-1">

      <!-- Filter Bar -->
      <div class="flex items-center gap-4 mb-6">

        <!-- Status Filter Pills -->
        <div class="flex items-center gap-1 bg-gray-900 border border-gray-800 rounded-xl p-1">
          <template x-for="s in ['all', 'dialing', 'active', 'completed', 'failed']" :key="s">
            <button
              @click="setStatus(s)"
              class="px-3 py-1.5 rounded-lg text-xs font-medium transition-colors capitalize"
              :class="statusFilter === s
                ? 'bg-indigo-600 text-white'
                : 'text-gray-400 hover:text-gray-200 hover:bg-gray-800'">
              <span x-text="s"></span>
              <template x-if="statusCounts[s] !== undefined">
                <span class="ml-1 text-[10px] opacity-70" x-text="'(' + statusCounts[s] + ')'"></span>
              </template>
            </button>
          </template>
        </div>

        <!-- Search -->
        <div class="relative flex-1 max-w-xs">
          <i data-lucide="search" class="w-4 h-4 text-gray-500 absolute left-3 top-2.5 pointer-events-none"></i>
          <input
            x-model="searchQuery"
            @input="debouncedSearch()"
            type="text"
            placeholder="Search by phone number..."
            class="w-full bg-gray-900 border border-gray-800 rounded-xl pl-9 pr-4 py-2 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
          <button x-show="searchQuery" @click="searchQuery = ''; loadCalls()" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-300">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
        </div>

        <!-- Count -->
        <p class="text-sm text-gray-500 ml-auto" x-text="totalCount > 0 ? `${totalCount} calls` : ''"></p>
      </div>

      <!-- Calls Table -->
      <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">

        <!-- Table Header -->
        <div class="grid grid-cols-[auto_1fr_1fr_1fr_1fr_1fr_1fr_1fr] gap-0 border-b border-gray-800 px-6 py-3">
          <div class="w-8 text-xs font-medium text-gray-500 uppercase tracking-wider">#</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Direction</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Status</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Duration</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Cost</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Latency</div>
          <div class="text-xs font-medium text-gray-500 uppercase tracking-wider">Date</div>
        </div>

        <!-- Loading Skeleton -->
        <template x-if="loading">
          <div class="divide-y divide-gray-800/50">
            <template x-for="i in 8" :key="i">
              <div class="grid grid-cols-[auto_1fr_1fr_1fr_1fr_1fr_1fr_1fr] gap-0 px-6 py-4 items-center">
                <div class="w-8 h-4 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-4 w-28 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-5 w-20 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-5 w-20 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-4 w-12 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-4 w-10 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-4 w-14 bg-gray-800 rounded animate-pulse"></div>
                <div class="h-4 w-20 bg-gray-800 rounded animate-pulse"></div>
              </div>
            </template>
          </div>
        </template>

        <!-- Empty State -->
        <template x-if="!loading && filteredCalls.length === 0">
          <div class="flex flex-col items-center justify-center py-20">
            <div class="w-14 h-14 bg-gray-800 rounded-full flex items-center justify-center mb-4">
              <i data-lucide="phone-missed" class="w-6 h-6 text-gray-600"></i>
            </div>
            <p class="text-sm font-medium text-gray-400">No calls found</p>
            <p class="text-xs text-gray-600 mt-1" x-text="searchQuery || statusFilter !== 'all' ? 'Try adjusting your filters' : 'No calls have been made yet'"></p>
          </div>
        </template>

        <!-- Rows -->
        <template x-if="!loading && filteredCalls.length > 0">
          <div class="divide-y divide-gray-800/50">
            <template x-for="(call, idx) in filteredCalls" :key="call.id">
              <div>
                <!-- Call Row -->
                <div
                  @click="toggleTranscript(call.id)"
                  class="grid grid-cols-[auto_1fr_1fr_1fr_1fr_1fr_1fr_1fr] gap-0 px-6 py-3.5 items-center cursor-pointer hover:bg-gray-800/40 transition-colors"
                  :class="expandedCallId === call.id ? 'bg-gray-800/20' : ''">

                  <!-- # -->
                  <div class="w-8 text-xs text-gray-600" x-text="(currentPage - 1) * pageSize + idx + 1"></div>

                  <!-- Phone -->
                  <div class="font-mono text-xs text-gray-300" x-text="call.to_number || call.from_number || '—'"></div>

                  <!-- Direction -->
                  <div>
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium"
                      :class="call.direction === 'outbound' ? 'bg-indigo-500/10 text-indigo-400' : 'bg-purple-500/10 text-purple-400'">
                      <i :data-lucide="call.direction === 'outbound' ? 'arrow-up-right' : 'arrow-down-left'" class="w-3 h-3"></i>
                      <span x-text="call.direction || '—'"></span>
                    </span>
                  </div>

                  <!-- Status -->
                  <div>
                    <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-md text-xs font-medium"
                      :class="{
                        'bg-amber-500/10 text-amber-400': call.status === 'dialing',
                        'bg-emerald-500/10 text-emerald-400': call.status === 'active',
                        'bg-gray-700/50 text-gray-400': call.status === 'completed',
                        'bg-red-500/10 text-red-400': call.status === 'failed'
                      }">
                      <span class="w-1.5 h-1.5 rounded-full"
                        :class="{
                          'bg-amber-400 animate-pulse': call.status === 'dialing',
                          'bg-emerald-400 animate-pulse': call.status === 'active',
                          'bg-gray-400': call.status === 'completed',
                          'bg-red-400': call.status === 'failed'
                        }"></span>
                      <span x-text="call.status || '—'"></span>
                    </span>
                  </div>

                  <!-- Duration -->
                  <div class="text-xs text-gray-400" x-text="formatDuration(call.duration_seconds)"></div>

                  <!-- Cost -->
                  <div class="text-xs text-gray-400" x-text="call.cost_cents != null ? call.cost_cents + '¢' : '—'"></div>

                  <!-- Latency -->
                  <div class="text-xs text-gray-400" x-text="call.avg_latency_ms ? call.avg_latency_ms + 'ms' : '—'"></div>

                  <!-- Date -->
                  <div class="text-xs text-gray-500" x-text="formatDate(call.started_at)"></div>
                </div>

                <!-- Transcript Slide-Down -->
                <div
                  x-show="expandedCallId === call.id"
                  x-transition:enter="transition ease-out duration-200"
                  x-transition:enter-start="opacity-0 -translate-y-2"
                  x-transition:enter-end="opacity-100 translate-y-0"
                  x-transition:leave="transition ease-in duration-150"
                  x-transition:leave-start="opacity-100 translate-y-0"
                  x-transition:leave-end="opacity-0 -translate-y-2"
                  class="bg-gray-800/20 border-t border-gray-800/50 px-8 py-5">

                  <!-- Transcript Loading -->
                  <template x-if="transcriptLoading && expandedCallId === call.id">
                    <div class="space-y-3">
                      <div class="h-3 w-20 bg-gray-800 rounded animate-pulse mb-4"></div>
                      <div class="flex justify-start"><div class="h-9 w-52 bg-gray-800 rounded-xl animate-pulse"></div></div>
                      <div class="flex justify-end"><div class="h-9 w-44 bg-gray-800 rounded-xl animate-pulse"></div></div>
                      <div class="flex justify-start"><div class="h-9 w-64 bg-gray-800 rounded-xl animate-pulse"></div></div>
                    </div>
                  </template>

                  <!-- Transcript Content -->
                  <template x-if="!transcriptLoading && transcriptData && expandedCallId === call.id">
                    <div>
                      <div class="flex items-center justify-between mb-4">
                        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Transcript</p>
                        <div class="flex items-center gap-3 text-xs text-gray-500">
                          <span x-show="transcriptData.ended_at">
                            Duration: <span class="text-gray-300" x-text="formatDuration(transcriptData.duration_seconds)"></span>
                          </span>
                          <span x-show="transcriptData.cost_cents != null">
                            Cost: <span class="text-gray-300" x-text="transcriptData.cost_cents + '¢'"></span>
                          </span>
                        </div>
                      </div>

                      <template x-if="!transcriptData.turns || transcriptData.turns.length === 0">
                        <p class="text-sm text-gray-500 italic text-center py-4">No transcript available yet.</p>
                      </template>

                      <div class="space-y-2.5 max-h-72 overflow-y-auto pr-2">
                        <template x-for="(turn, tidx) in (transcriptData.turns || [])" :key="tidx">
                          <div class="flex flex-col" :class="turn.role === 'assistant' ? 'items-end' : 'items-start'">
                            <div class="text-[10px] font-medium mb-1 px-1"
                              :class="turn.role === 'assistant' ? 'text-indigo-500' : 'text-gray-600'">
                              <span x-text="turn.role === 'assistant' ? 'AI Agent' : 'User'"></span>
                            </div>
                            <div class="max-w-sm px-4 py-2.5 rounded-2xl text-sm leading-relaxed"
                              :class="turn.role === 'assistant' ? 'bg-indigo-600/25 text-indigo-200 rounded-tr-sm' : 'bg-gray-700 text-gray-300 rounded-tl-sm'">
                              <p x-text="turn.text"></p>
                            </div>
                            <div x-show="turn.role === 'assistant' && turn.latency_ms"
                              class="flex items-center gap-1 mt-1 px-1">
                              <i data-lucide="zap" class="w-2.5 h-2.5 text-indigo-500/60"></i>
                              <span class="text-[10px] text-indigo-500/60" x-text="turn.latency_ms + 'ms'"></span>
                            </div>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Pagination -->
        <template x-if="!loading && totalCount > 0">
          <div class="flex items-center justify-between px-6 py-4 border-t border-gray-800">
            <p class="text-xs text-gray-500">
              Showing
              <span class="text-gray-300 font-medium" x-text="Math.min((currentPage - 1) * pageSize + 1, totalCount)"></span>
              –
              <span class="text-gray-300 font-medium" x-text="Math.min(currentPage * pageSize, totalCount)"></span>
              of
              <span class="text-gray-300 font-medium" x-text="totalCount"></span>
            </p>
            <div class="flex items-center gap-2">
              <button
                @click="prevPage()"
                :disabled="currentPage === 1"
                class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-400 bg-gray-800 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg transition-colors">
                <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i> Previous
              </button>
              <div class="flex items-center gap-1">
                <template x-for="page in visiblePages" :key="page">
                  <button
                    @click="goToPage(page)"
                    class="w-7 h-7 text-xs font-medium rounded-lg transition-colors"
                    :class="page === currentPage
                      ? 'bg-indigo-600 text-white'
                      : 'text-gray-400 hover:text-gray-200 hover:bg-gray-800'"
                    x-text="page">
                  </button>
                </template>
              </div>
              <button
                @click="nextPage()"
                :disabled="currentPage >= totalPages"
                class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-gray-400 bg-gray-800 hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg transition-colors">
                Next <i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
        </template>
      </div>

    </main>
  </div>

  <script>
    const API = '';

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `flex items-start gap-3 px-4 py-3 rounded-xl shadow-2xl text-sm font-medium max-w-sm border ${
        type === 'success'
          ? 'bg-gray-900 border-emerald-500/40 text-emerald-300'
          : 'bg-gray-900 border-red-500/40 text-red-300'
      }`;
      toast.innerHTML = `
        <span class="flex-shrink-0 mt-0.5">${type === 'success' ? '✓' : '✕'}</span>
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    async function apiFetch(url, options = {}) {
      try {
        const res = await fetch(API + url, {
          headers: { 'Content-Type': 'application/json' },
          ...options
        });
        if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
        return res.status === 204 ? null : await res.json();
      } catch (e) {
        showToast(e.message, 'error');
        throw e;
      }
    }

    function callsApp() {
      return {
        apiStatus: 'unknown',
        loading: true,
        transcriptLoading: false,
        allCalls: [],
        expandedCallId: null,
        transcriptData: null,
        statusFilter: 'all',
        searchQuery: '',
        currentPage: 1,
        pageSize: 20,
        pollInterval: null,
        searchTimeout: null,

        get hasActive() {
          return this.allCalls.some(c => c.status === 'active' || c.status === 'dialing');
        },

        get filteredCalls() {
          let calls = this.allCalls;

          if (this.statusFilter !== 'all') {
            calls = calls.filter(c => c.status === this.statusFilter);
          }

          if (this.searchQuery.trim()) {
            const q = this.searchQuery.trim().toLowerCase();
            calls = calls.filter(c =>
              (c.to_number || '').toLowerCase().includes(q) ||
              (c.from_number || '').toLowerCase().includes(q)
            );
          }

          const start = (this.currentPage - 1) * this.pageSize;
          return calls.slice(start, start + this.pageSize);
        },

        get totalCount() {
          let calls = this.allCalls;
          if (this.statusFilter !== 'all') calls = calls.filter(c => c.status === this.statusFilter);
          if (this.searchQuery.trim()) {
            const q = this.searchQuery.trim().toLowerCase();
            calls = calls.filter(c =>
              (c.to_number || '').toLowerCase().includes(q) ||
              (c.from_number || '').toLowerCase().includes(q)
            );
          }
          return calls.length;
        },

        get totalPages() {
          return Math.max(1, Math.ceil(this.totalCount / this.pageSize));
        },

        get visiblePages() {
          const total = this.totalPages;
          const cur = this.currentPage;
          const pages = [];
          const range = 2;
          for (let i = Math.max(1, cur - range); i <= Math.min(total, cur + range); i++) {
            pages.push(i);
          }
          return pages;
        },

        get statusCounts() {
          const counts = { all: this.allCalls.length };
          ['dialing', 'active', 'completed', 'failed'].forEach(s => {
            counts[s] = this.allCalls.filter(c => c.status === s).length;
          });
          return counts;
        },

        async init() {
          await this.checkHealth();
          await this.loadCalls();
          lucide.createIcons();
          this.startPolling();
        },

        async checkHealth() {
          try {
            await apiFetch('/health');
            this.apiStatus = 'connected';
          } catch {
            this.apiStatus = 'offline';
          }
        },

        async loadCalls() {
          this.loading = true;
          try {
            const data = await apiFetch(`/calls?page=1&limit=100`) || {};
            this.allCalls = data.items || [];
          } catch {
            this.allCalls = [];
          } finally {
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        setStatus(s) {
          this.statusFilter = s;
          this.currentPage = 1;
          this.expandedCallId = null;
        },

        debouncedSearch() {
          clearTimeout(this.searchTimeout);
          this.searchTimeout = setTimeout(() => {
            this.currentPage = 1;
            this.expandedCallId = null;
          }, 300);
        },

        async toggleTranscript(callId) {
          if (this.expandedCallId === callId) {
            this.expandedCallId = null;
            this.transcriptData = null;
            return;
          }
          this.expandedCallId = callId;
          this.transcriptLoading = true;
          this.transcriptData = null;
          try {
            this.transcriptData = await apiFetch(`/calls/${callId}`);
          } catch {
            this.transcriptData = { turns: [] };
          } finally {
            this.transcriptLoading = false;
            this.$nextTick(() => lucide.createIcons());
          }
        },

        prevPage() {
          if (this.currentPage > 1) {
            this.currentPage--;
            this.expandedCallId = null;
          }
        },

        nextPage() {
          if (this.currentPage < this.totalPages) {
            this.currentPage++;
            this.expandedCallId = null;
          }
        },

        goToPage(page) {
          this.currentPage = page;
          this.expandedCallId = null;
        },

        startPolling() {
          this.pollInterval = setInterval(async () => {
            if (this.hasActive) {
              const data = await apiFetch('/calls?page=1&limit=100').catch(() => null);
              if (data) {
                this.allCalls = data.items || [];
                this.$nextTick(() => lucide.createIcons());
              }
            }
          }, 5000);
        },

        formatDuration(seconds) {
          if (seconds == null) return '—';
          const m = Math.floor(seconds / 60);
          const s = seconds % 60;
          return m > 0 ? `${m}m ${s}s` : `${s}s`;
        },

        formatDate(dateStr) {
          if (!dateStr) return '—';
          return new Date(dateStr).toLocaleDateString('en-US', {
            month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        }
      }
    }

    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
